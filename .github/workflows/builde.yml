name: Build PersistenceHelper Embedded

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          repository: ptwxhq/TrollStore
          submodules: recursive
          fetch-depth: 0

      - name: Setup Theos
        run: |
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          sudo chown -R "$USER" /opt/theos
          echo "THEOS=/opt/theos" >> "$GITHUB_ENV"
          echo "/opt/theos/bin" >> "$GITHUB_PATH"

      - name: Setup iOS SDK
        run: |
          rm -rf "$THEOS/sdks"
          git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"

      - name: Install Dependencies
        run: |
          brew install libarchive ldid xz

          PWNIFY_DIR=$(find . -name "Pwnify" -type d -not -path "*/.*" | head -n 1)
          cd "$PWNIFY_DIR"
          make
          sudo cp ./pwnify /usr/local/bin/pwnify || sudo cp ./obj/pwnify /usr/local/bin/pwnify
          sudo chmod +x /usr/local/bin/pwnify

      - name: Build PersistenceHelper Embedded
        run: |
          export THEOS=/opt/theos
          export PATH="$THEOS/bin:$PATH"
          LIBARCHIVE_PATH=$(brew --prefix libarchive)

          rm -rf ./_build
          mkdir -p ./_build

          make -C ./Exploits/fastPathSign

          make -C ./RootHelper DEBUG=0 \
            ADDITIONAL_LDFLAGS="$LIBARCHIVE_PATH/lib/libarchive.a" \
            THEOS_OBJCCFLAGS="-I$LIBARCHIVE_PATH/include"

          make -C ./TrollStore FINALPACKAGE=1 \
            ADDITIONAL_LDFLAGS="$LIBARCHIVE_PATH/lib/libarchive.a" \
            THEOS_OBJCCFLAGS="-I$LIBARCHIVE_PATH/include"

          make clean -C ./TrollHelper
          cp ./RootHelper/.theos/obj/trollstorehelper ./TrollHelper/Resources/trollstorehelper
          make -C ./TrollHelper FINALPACKAGE=1 package \
            ADDITIONAL_LDFLAGS="$LIBARCHIVE_PATH/lib/libarchive.a" \
            THEOS_OBJCCFLAGS="-I$LIBARCHIVE_PATH/include"
          make clean -C ./TrollHelper
          make -C ./TrollHelper THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 package \
            ADDITIONAL_LDFLAGS="$LIBARCHIVE_PATH/lib/libarchive.a" \
            THEOS_OBJCCFLAGS="-I$LIBARCHIVE_PATH/include"
          rm ./TrollHelper/Resources/trollstorehelper

          cp ./RootHelper/.theos/obj/trollstorehelper ./TrollStore/.theos/obj/TrollStore.app/trollstorehelper
          cp ./TrollHelper/.theos/obj/TrollStorePersistenceHelper.app/TrollStorePersistenceHelper ./TrollStore/.theos/obj/TrollStore.app/PersistenceHelper
          cp ./files/ldid ./TrollStore/.theos/obj/TrollStore.app/ldid.bundled
          COPYFILE_DISABLE=1 tar -czvf ./_build/TrollStore.tar -C ./TrollStore/.theos/obj TrollStore.app

          python3 ./scripts/embed_file_as_objc.py ./_build/TrollStore.tar ./TrollHelper/EmbeddedTrollStoreTar.m

          make clean -C ./TrollHelper
          make -C ./TrollHelper FINALPACKAGE=1 EMBEDDED_ROOT_HELPER=1 EMBEDDED_TROLLSTORE_TAR=1 \
            ADDITIONAL_LDFLAGS="$LIBARCHIVE_PATH/lib/libarchive.a" \
            THEOS_OBJCCFLAGS="-I$LIBARCHIVE_PATH/include"

          cp ./TrollHelper/.theos/obj/TrollStorePersistenceHelper.app/TrollStorePersistenceHelper ./_build/PersistenceHelper_Embedded
          rm ./TrollHelper/EmbeddedTrollStoreTar.m

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersistenceHelper_Embedded
          path: _build/PersistenceHelper_Embedded
          if-no-files-found: error
